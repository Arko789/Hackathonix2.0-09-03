<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskr — Smart Todo</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c0f;
      --surface: #13151a;
      --surface2: #1c1f28;
      --border: #272b38;
      --accent: #e8ff47;
      --accent2: #ff6b47;
      --accent3: #47c8ff;
      --text: #f0f0f0;
      --muted: #6b7280;
      --high: #ff6b47;
      --medium: #f59e0b;
      --low: #47c8ff;
      --success: #4ade80;
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BG GRID */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* NOISE OVERLAY */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .app { position: relative; z-index: 1; }

    /* ─── AUTH SCREEN ─── */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(232,255,71,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-mark svg { width: 20px; height: 20px; }

    .auth-logo span {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 32px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 7px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
    }

    .auth-tab.active {
      background: var(--accent);
      color: #0b0c0f;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      font-family: 'DM Mono', monospace;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.1);
    }

    .form-group input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0b0c0f;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      margin-top: 8px;
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,255,71,0.25); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .auth-error {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(255,107,71,0.12);
      border: 1px solid rgba(255,107,71,0.3);
      border-radius: 8px;
      font-size: 13px;
      color: var(--high);
      display: none;
    }

    /* ─── MAIN APP ─── */
    #main-screen { display: none; min-height: 100vh; }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(11,12,15,0.85);
      backdrop-filter: blur(16px);
      z-index: 50;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 800;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 16px 6px 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .user-avatar {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #0b0c0f;
    }

    .btn-logout {
      padding: 8px 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: var(--high); color: var(--high); }

    /* MAIN CONTENT */
    .main-content {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .page-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .page-title span { color: var(--accent); }

    .page-subtitle {
      color: var(--muted);
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      margin-bottom: 40px;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .stat-card:hover { transform: translateY(-2px); }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
    }

    .stat-card.high-card::after { background: var(--high); }
    .stat-card.medium-card::after { background: var(--medium); }
    .stat-card.low-card::after { background: var(--low); }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 8px;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .high-card .stat-num { color: var(--high); }
    .medium-card .stat-num { color: var(--medium); }
    .low-card .stat-num { color: var(--low); }

    /* ADD TODO FORM */
    .add-todo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .add-todo-card::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(232,255,71,0.07) 0%, transparent 70%);
    }

    .add-todo-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'DM Mono', monospace;
    }

    .add-todo-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: end;
    }

    @media (max-width: 600px) {
      .add-todo-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
      .header { padding: 16px 20px; }
      .main-content { padding: 32px 16px; }
    }

    .input-wrap { position: relative; }

    .todo-input {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .todo-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.1);
    }

    .todo-input::placeholder { color: var(--muted); }

    .date-input {
      padding: 13px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      white-space: nowrap;
      cursor: pointer;
    }

    .date-input:focus { border-color: var(--accent); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

    .btn-add {
      padding: 13px 28px;
      background: var(--accent);
      color: #0b0c0f;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,255,71,0.25); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-right: 4px;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #0b0c0f; border-color: var(--accent); }

    /* TODO LIST */
    .todo-list { display: flex; flex-direction: column; gap: 10px; }

    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.2s;
      animation: fadeIn 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .todo-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }

    .todo-item.priority-high::before { background: var(--high); }
    .todo-item.priority-medium::before { background: var(--medium); }
    .todo-item.priority-low::before { background: var(--low); }

    .todo-item:hover { border-color: rgba(232,255,71,0.2); transform: translateX(2px); }
    .todo-item.complete { opacity: 0.45; }

    .todo-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .todo-check.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .todo-check svg { width: 12px; height: 12px; display: none; }
    .todo-check.checked svg { display: block; }

    .todo-check:hover { border-color: var(--success); }

    .todo-body { flex: 1; min-width: 0; }

    .todo-text {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .todo-item.complete .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .priority-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
    }

    .priority-badge.high { background: rgba(255,107,71,0.15); color: var(--high); }
    .priority-badge.medium { background: rgba(245,158,11,0.15); color: var(--medium); }
    .priority-badge.low { background: rgba(71,200,255,0.15); color: var(--low); }

    .deadline-tag {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .deadline-tag.urgent { color: var(--high); }

    .todo-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .todo-item:hover .todo-actions { opacity: 1; }

    .btn-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .btn-icon:hover.edit { border-color: var(--accent3); color: var(--accent3); background: rgba(71,200,255,0.1); }
    .btn-icon:hover.delete { border-color: var(--high); color: var(--high); background: rgba(255,107,71,0.1); }

    /* EDIT INLINE */
    .todo-edit-input {
      width: 100%;
      padding: 6px 10px;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      outline: none;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
      opacity: 0.5;
    }

    .empty-state p { font-size: 14px; font-family: 'DM Mono', monospace; }

    /* LOADING */
    .loader {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(11,12,15,0.3);
      border-top-color: #0b0c0f;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .loading-overlay .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* TOAST */
    .toast-container {
      position: fixed;
      bottom: 32px; right: 32px;
      display: flex; flex-direction: column;
      gap: 10px;
      z-index: 9999;
    }

    .toast {
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .toast.success { background: #1a2e1a; border: 1px solid var(--success); color: var(--success); }
    .toast.error { background: #2e1a1a; border: 1px solid var(--high); color: var(--high); }
    .toast.info { background: #1a1a2e; border: 1px solid var(--accent3); color: var(--accent3); }
    .toast.out { animation: toastOut 0.3s ease forwards; }

    /* PROFILE PANEL */
    .profile-panel {
      position: fixed;
      top: 0; right: -380px;
      width: 360px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 200;
      transition: right 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 32px;
      overflow-y: auto;
    }

    .profile-panel.open { right: 0; }

    .profile-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 199;
      display: none;
      backdrop-filter: blur(4px);
    }

    .profile-overlay.open { display: block; }

    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .profile-header h2 {
      font-size: 20px;
      font-weight: 800;
    }

    .btn-close {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }

    .profile-avatar {
      width: 72px; height: 72px;
      background: var(--accent);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: #0b0c0f;
      margin-bottom: 20px;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .profile-email {
      font-size: 13px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 24px;
    }

    .profile-bio {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      padding: 16px;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 24px;
      font-style: italic;
    }

    .profile-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 16px;
    }

    .profile-form input, .profile-form textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }

    .profile-form textarea {
      resize: vertical;
      min-height: 80px;
    }

    .profile-form input:focus, .profile-form textarea:focus {
      border-color: var(--accent);
    }

    .btn-save-profile {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #0b0c0f;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save-profile:hover { opacity: 0.9; }

    /* ANIMATIONS */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px) scale(0.95); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes toastOut {
      to { opacity: 0; transform: translateX(20px) scale(0.95); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: skeleton 1.2s infinite;
      border-radius: 8px;
    }

    @keyframes skeleton {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0b0c0f" stroke-width="2.5">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <span>Taskr</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button class="btn-primary" id="btn-login" onclick="handleLogin()">Sign In</button>
        <div class="auth-error" id="login-error"></div>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" style="display:none">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Your name" autocomplete="name"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password"/>
        </div>
        <button class="btn-primary" id="btn-register" onclick="handleRegister()">Create Account</button>
        <div class="auth-error" id="register-error"></div>
      </div>
    </div>
  </div>

  <!-- MAIN SCREEN -->
  <div id="main-screen">
    <header class="header">
      <div class="header-logo">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0b0c0f" stroke-width="2.5">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        Taskr
      </div>
      <div class="header-right">
        <div class="user-chip" id="user-chip" onclick="openProfile()" style="cursor:pointer">
          <div class="user-avatar" id="user-avatar">?</div>
          <span id="user-name-display">User</span>
        </div>
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
      </div>
    </header>

    <div class="main-content">
      <div class="page-title">Your <span>Tasks</span></div>
      <div class="page-subtitle" id="date-display">— loading...</div>

      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card high-card">
          <div class="stat-label">🔴 High Priority</div>
          <div class="stat-num" id="stat-high">0</div>
        </div>
        <div class="stat-card medium-card">
          <div class="stat-label">🟡 Medium</div>
          <div class="stat-num" id="stat-medium">0</div>
        </div>
        <div class="stat-card low-card">
          <div class="stat-label">🔵 Low</div>
          <div class="stat-num" id="stat-low">0</div>
        </div>
      </div>

      <!-- ADD FORM -->
      <div class="add-todo-card">
        <div class="add-todo-title">// new task</div>
        <div class="add-todo-row">
          <div class="input-wrap">
            <input class="todo-input" type="text" id="new-todo-title"
              placeholder='e.g. "Finish project ASAP" or "Read book"'
              onkeydown="if(event.key==='Enter') addTodo()"/>
          </div>
          <input class="date-input" type="date" id="new-todo-deadline"/>
          <button class="btn-add" id="btn-add-todo" onclick="addTodo()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Task
          </button>
        </div>
      </div>

      <!-- FILTER -->
      <div class="filter-bar">
        <span class="filter-label">Filter:</span>
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
        <button class="filter-btn" onclick="setFilter('medium', this)">🟡 Medium</button>
        <button class="filter-btn" onclick="setFilter('low', this)">🔵 Low</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
      </div>

      <!-- TODO LIST -->
      <div class="todo-list" id="todo-list">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- PROFILE PANEL -->
  <div class="profile-overlay" id="profile-overlay" onclick="closeProfile()"></div>
  <div class="profile-panel" id="profile-panel">
    <div class="profile-header">
      <h2>Profile</h2>
      <button class="btn-close" onclick="closeProfile()">✕</button>
    </div>
    <div class="profile-avatar" id="profile-avatar-big">?</div>
    <div class="profile-name" id="profile-name-big">—</div>
    <div class="profile-email" id="profile-email-big">—</div>
    <div class="profile-bio" id="profile-bio-display">No bio yet.</div>

    <div class="profile-section-title">// update profile</div>
    <div class="profile-form">
      <input type="text" id="profile-bio-input" placeholder="Bio (optional)"/>
      <input type="text" id="profile-image-input" placeholder="Profile image URL (optional)"/>
      <button class="btn-save-profile" onclick="saveProfile()">Save Profile</button>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container"></div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const API = window.location.origin; // same-origin since frontend is served from backend

  // ─── STATE ────────────────────────────────────────────────
  let token = localStorage.getItem('taskr_token') || null;
  let todos = [];
  let currentFilter = 'all';

  // ─── INIT ─────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    updateDateDisplay();
    if (token) showApp();
    else showAuth();

    // Enter key on auth forms
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('reg-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRegister();
    });
  });

  function updateDateDisplay() {
    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('date-display').textContent = `— ${now.toLocaleDateString('en-US', options)}`;
  }

  // ─── AUTH TABS ────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('register-error').style.display = 'none';
  }

  // ─── AUTH HANDLERS ────────────────────────────────────────
  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('btn-login');

    if (!email || !password) return showFieldError(errEl, 'Please fill in all fields.');

    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Signing in...';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'Login failed');

      token = data.token;
      localStorage.setItem('taskr_token', token);
      showApp();
    } catch (err) {
      showFieldError(errEl, err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function handleRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const errEl = document.getElementById('register-error');
    const btn = document.getElementById('btn-register');

    if (!username || !email || !password) return showFieldError(errEl, 'Please fill in all fields.');

    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Creating account...';

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'Registration failed');

      showToast('Account created! Please sign in.', 'success');
      switchTab('login');
      document.getElementById('login-email').value = email;
    } catch (err) {
      showFieldError(errEl, err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  function handleLogout() {
    token = null;
    localStorage.removeItem('taskr_token');
    todos = [];
    showAuth();
    showToast('Signed out.', 'info');
  }

  function showFieldError(el, msg) {
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ─── SHOW/HIDE SCREENS ────────────────────────────────────
  function showAuth() {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('main-screen').style.display = 'none';
  }

  async function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    await loadProfile();
    await loadTodos();
  }

  // ─── PROFILE ──────────────────────────────────────────────
  async function loadProfile() {
    try {
      const res = await fetch(`${API}/auth/profile`, { headers: { token } });
      if (res.status === 401) { handleLogout(); return; }
      const user = await res.json();

      const initial = (user.username || 'U')[0].toUpperCase();
      document.getElementById('user-avatar').textContent = initial;
      document.getElementById('user-name-display').textContent = user.username || 'User';
      document.getElementById('profile-avatar-big').textContent = initial;
      document.getElementById('profile-name-big').textContent = user.username || '—';
      document.getElementById('profile-email-big').textContent = user.email || '—';
      document.getElementById('profile-bio-display').textContent = user.bio || 'No bio yet.';
      document.getElementById('profile-bio-input').value = user.bio || '';
      document.getElementById('profile-image-input').value = user.image || '';
    } catch (e) { /* silent */ }
  }

  async function saveProfile() {
    const bio = document.getElementById('profile-bio-input').value;
    const image = document.getElementById('profile-image-input').value;

    try {
      const res = await fetch(`${API}/user/profile`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', token },
        body: JSON.stringify({ bio, image })
      });
      if (!res.ok) throw new Error('Failed to update');
      showToast('Profile updated!', 'success');
      document.getElementById('profile-bio-display').textContent = bio || 'No bio yet.';
    } catch (e) {
      showToast('Failed to update profile.', 'error');
    }
  }

  function openProfile() {
    document.getElementById('profile-panel').classList.add('open');
    document.getElementById('profile-overlay').classList.add('open');
  }

  function closeProfile() {
    document.getElementById('profile-panel').classList.remove('open');
    document.getElementById('profile-overlay').classList.remove('open');
  }

  // ─── TODOS ────────────────────────────────────────────────
  async function loadTodos() {
    document.getElementById('todo-list').innerHTML = `<div class="loading-overlay"><div class="spinner"></div></div>`;
    try {
      const res = await fetch(`${API}/todos`, { headers: { token } });
      if (res.status === 401) { handleLogout(); return; }
      todos = await res.json();
      renderTodos();
    } catch (e) {
      document.getElementById('todo-list').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Failed to load</h3><p>Check your connection</p></div>`;
    }
  }

  async function addTodo() {
    const titleInput = document.getElementById('new-todo-title');
    const deadlineInput = document.getElementById('new-todo-deadline');
    const title = titleInput.value.trim();
    const deadline = deadlineInput.value;
    const btn = document.getElementById('btn-add-todo');

    if (!title) {
      titleInput.focus();
      titleInput.style.borderColor = 'var(--high)';
      setTimeout(() => titleInput.style.borderColor = '', 1500);
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Adding...';

    try {
      const body = { title };
      if (deadline) body.deadline = deadline;

      const res = await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', token },
        body: JSON.stringify(body)
      });

      if (!res.ok) throw new Error('Failed to add');
      const newTodo = await res.json();

      todos.unshift(newTodo);
      titleInput.value = '';
      deadlineInput.value = '';
      renderTodos();
      showToast(`Task added — ${newTodo.priority} priority`, newTodo.priority === 'high' ? 'error' : 'success');
    } catch (e) {
      showToast('Failed to add task.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Task`;
    }
  }

  async function toggleComplete(id) {
    const todo = todos.find(t => t._id === id);
    if (!todo) return;

    const newVal = !todo.complete;
    todo.complete = newVal; // optimistic
    renderTodos();

    try {
      const res = await fetch(`${API}/todos/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', token },
        body: JSON.stringify({ complete: newVal })
      });
      if (!res.ok) throw new Error();
    } catch {
      todo.complete = !newVal; // revert
      renderTodos();
      showToast('Update failed.', 'error');
    }
  }

  async function deleteTodo(id) {
    const prevTodos = [...todos];
    todos = todos.filter(t => t._id !== id);
    renderTodos();

    try {
      const res = await fetch(`${API}/todos/${id}`, {
        method: 'DELETE',
        headers: { token }
      });
      if (!res.ok) throw new Error();
      showToast('Task deleted.', 'info');
    } catch {
      todos = prevTodos;
      renderTodos();
      showToast('Delete failed.', 'error');
    }
  }

  async function saveEdit(id, newTitle) {
    if (!newTitle.trim()) return;
    const todo = todos.find(t => t._id === id);
    if (!todo) return;
    const old = todo.title;
    todo.title = newTitle.trim();
    renderTodos();

    try {
      const res = await fetch(`${API}/todos/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', token },
        body: JSON.stringify({ title: newTitle.trim() })
      });
      if (!res.ok) throw new Error();
      showToast('Task updated.', 'success');
    } catch {
      todo.title = old;
      renderTodos();
      showToast('Update failed.', 'error');
    }
  }

  // ─── RENDER ───────────────────────────────────────────────
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTodos();
  }

  function getFilteredTodos() {
    switch (currentFilter) {
      case 'high': return todos.filter(t => t.priority === 'high');
      case 'medium': return todos.filter(t => t.priority === 'medium');
      case 'low': return todos.filter(t => t.priority === 'low');
      case 'pending': return todos.filter(t => !t.complete);
      case 'done': return todos.filter(t => t.complete);
      default: return todos;
    }
  }

  function renderTodos() {
    const filtered = getFilteredTodos();
    const list = document.getElementById('todo-list');

    // Update stats
    document.getElementById('stat-high').textContent = todos.filter(t => t.priority === 'high' && !t.complete).length;
    document.getElementById('stat-medium').textContent = todos.filter(t => t.priority === 'medium' && !t.complete).length;
    document.getElementById('stat-low').textContent = todos.filter(t => t.priority === 'low' && !t.complete).length;

    if (filtered.length === 0) {
      const msgs = {
        all: ['Nothing here yet', 'Add your first task above'],
        high: ['No high-priority tasks', 'Great — you\'re clear!'],
        medium: ['No medium tasks', ''],
        low: ['No low-priority tasks', ''],
        pending: ['All done! 🎉', 'You\'ve completed everything'],
        done: ['Nothing completed yet', 'Get started above']
      };
      const [h, p] = msgs[currentFilter] || msgs.all;
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3>${h}</h3><p>${p}</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(todo => {
      const isUrgent = todo.deadline && (new Date(todo.deadline) - new Date()) < 24 * 3600 * 1000;
      const deadlineStr = todo.deadline
        ? `<span class="deadline-tag ${isUrgent ? 'urgent' : ''}">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            ${formatDeadline(todo.deadline)}
           </span>`
        : '';

      return `
        <div class="todo-item priority-${todo.priority} ${todo.complete ? 'complete' : ''}" id="item-${todo._id}">
          <div class="todo-check ${todo.complete ? 'checked' : ''}" onclick="toggleComplete('${todo._id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="todo-body">
            <div class="todo-text" id="text-${todo._id}">${escHtml(todo.title)}</div>
            <div class="todo-meta">
              <span class="priority-badge ${todo.priority}">${todo.priority}</span>
              ${deadlineStr}
            </div>
          </div>
          <div class="todo-actions">
            <button class="btn-icon edit" title="Edit" onclick="startEdit('${todo._id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="btn-icon delete" title="Delete" onclick="deleteTodo('${todo._id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  function startEdit(id) {
    const textEl = document.getElementById(`text-${id}`);
    const current = textEl.textContent;
    textEl.innerHTML = `<input class="todo-edit-input" value="${escHtml(current)}" 
      onblur="saveEdit('${id}', this.value)"
      onkeydown="if(event.key==='Enter'){this.blur()} if(event.key==='Escape'){document.getElementById('text-${id}').textContent='${escHtml(current)}'; renderTodos();}"/>`;
    textEl.querySelector('input').focus();
  }

  function formatDeadline(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = d - now;
    if (diff < 0) return 'Overdue';
    if (diff < 3600 * 1000) return 'Due soon';
    if (diff < 24 * 3600 * 1000) return 'Due today';
    const days = Math.ceil(diff / (24 * 3600 * 1000));
    if (days === 1) return 'Tomorrow';
    if (days < 7) return `${days}d left`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ─── TOAST ────────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const icons = { success: '✓', error: '✕', info: 'ℹ' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${icons[type]}</span> ${msg}`;
    container.appendChild(toast);

    setTimeout(() => {
      toast.classList.add('out');
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
</script>
</body>
</html>
